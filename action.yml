name: "Verity"
description: "Run your Playwright suite (Quick check or Full regression), detect flakes, and report to Verity."
author: "QAShift"
branding:
  icon: "check-circle"
  color: "purple"
inputs:
  tier:
    description: "'fast' (Quick check, diff-aware subset) or 'full' (Full regression, entire suite)."
    required: false
    default: "fast"
  token:
    description: "Verity ingest token (store as a secret)."
    required: true
  base:
    description: "Base ref for diff-aware selection on the fast tier."
    required: false
    default: "origin/main"
  api-url:
    description: "Verity API base URL."
    required: false
    default: "https://verity-kappa-ebon.vercel.app"
runs:
  using: "composite"
  steps:
    # Self-contained: the runner is vendored in this action (verity.mjs), so it
    # needs no npm install and no published package — just Node 20+ (default on
    # ubuntu-latest) and a Playwright install in your workflow.
    - shell: bash
      env:
        VERITY_INGEST_TOKEN: ${{ inputs.token }}
        VERITY_API_URL: ${{ inputs.api-url }}
        VERITY_PR_NUMBER: ${{ github.event.pull_request.number }}
      run: node "${{ github.action_path }}/verity.mjs" run --tier "${{ inputs.tier }}" --base "${{ inputs.base }}"
